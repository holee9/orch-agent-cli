repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^scripts/
        additional_dependencies: ["pyyaml", "jsonschema", "types-PyYAML"]

  - repo: local
    hooks:
      - id: smoke-test
        name: Orchestrator Smoke Test
        entry: python -m pytest tests/test_smoke.py -x -q
        language: python
        pass_filenames: false
        files: ^(scripts/|config/agents\.json)
